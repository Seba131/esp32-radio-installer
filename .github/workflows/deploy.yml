name: Deploy do GitHub Pages

# Publikuje strone instalatora przy kazdym pushu do main.
# Wymaga: Settings -> Pages -> Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:        # pozwala uruchomic recznie z zakladki Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Tylko jeden deploy naraz; nowszy anuluje trwajacy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pobierz repo
        uses: actions/checkout@v4

      - name: Konfiguracja Pages
        uses: actions/configure-pages@v5

      - name: Spakuj zawartosc (caly katalog)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
